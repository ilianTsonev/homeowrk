<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Club - Contact</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #121214; color: #00ffcc; margin: 0; padding: 0; }
        header { background-color: #1a1a24; padding: 20px; text-align: center; border-bottom: 3px solid #ff007f; }
        h1 { margin: 0; color: #ff007f; }
        nav { margin-top: 15px; }
        nav a { color: #00ffcc; margin: 0 15px; text-decoration: none; font-weight: bold; border: 1px solid #00ffcc; padding: 5px 10px; }
        nav a:hover { background-color: #00ffcc; color: #121214; }
        nav a.active { background-color: #ff007f; color: white; border-color: #ff007f; }
        .container { padding: 30px; max-width: 600px; margin: auto; }
        form { background-color: #1a1a24; padding: 20px; border: 2px solid #ff007f; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], textarea { width: 95%; padding: 8px; background-color: #121214; border: 1px solid #00ffcc; color: #00ffcc; font-family: inherit; }
        textarea { height: 100px; resize: vertical; }
        input:focus, textarea:focus { border-color: #ffff00; outline: none; }
        .submit-btn { background-color: #00ffcc; color: #121214; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: inherit; width: 100%; }
        .submit-btn:hover { background-color: #ff007f; color: white; }
        #form-response { margin-top: 15px; font-weight: bold; color: #ffff00; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>[ THE COMPUTER CLUB ]</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="resources.html">Resources</a>
            <a href="members.html">Members</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h2>Send a Packet (Contact Us)</h2>
        <p>Got a query or want to pitch an event? Send a message directly to our core shell console.</p>

        <form id="club-form">
            <div class="form-group">
                <label for="name">Handle / Name:</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Return Email Address:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="msg">Message Payload:</label>
                <textarea id="msg" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Transmit Message</button>
        </form>

        <div id="form-response"></div>
    </div>

    <footer>
        &copy; 2026 Computer Club | Built with pure HTML/CSS/JS.
    </footer>

    <script>
        document.getElementById('club-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents page reload
            
            const name = document.getElementById('name').value;
            const responseDiv = document.getElementById('form-response');
            
            // Artificial confirmation delay simulation
            responseDiv.textContent = "Transmitting data packets...";
            
            setTimeout(() => {
                responseDiv.innerHTML = `SUCCESS: Packet acknowledged! Thank you, ${name}. We will trace your routing soon.`;
                document.getElementById('club-form').reset();
            }, 1000);
        });
    </script>
</body>
</html>
